<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV-Hub Status</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
  .subtitle { color: #8b949e; font-size: 0.875rem; margin-bottom: 2rem; }
  .banner {
    padding: 1rem 1.25rem;
    border-radius: 8px;
    margin-bottom: 2rem;
    font-weight: 600;
    font-size: 1.1rem;
  }
  .banner.operational { background: #0d1f0d; border: 1px solid #238636; color: #3fb950; }
  .banner.degraded { background: #2a1f00; border: 1px solid #d29922; color: #e3b341; }
  .banner.down { background: #2d0000; border: 1px solid #da3633; color: #f85149; }
  .banner.loading { background: #161b22; border: 1px solid #30363d; color: #8b949e; }
  .services { display: flex; flex-direction: column; gap: 0.5rem; }
  .service {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 1rem;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 6px;
  }
  .service-left { display: flex; align-items: center; gap: 0.75rem; }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.up { background: #3fb950; box-shadow: 0 0 6px #3fb95066; }
  .dot.down { background: #f85149; box-shadow: 0 0 6px #f8514966; }
  .dot.unknown { background: #484f58; }
  .service-name { font-weight: 500; }
  .service-latency { color: #8b949e; font-size: 0.8rem; }
  .service-error { color: #f85149; font-size: 0.75rem; margin-top: 2px; }
  .meta {
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid #21262d;
    display: flex; flex-wrap: wrap; gap: 1.5rem;
    font-size: 0.8rem; color: #484f58;
  }
  .meta span { white-space: nowrap; }
  @media (max-width: 480px) {
    body { padding: 1rem 0.5rem; }
    .service { padding: 0.6rem 0.75rem; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>CV-Hub Platform Status</h1>
  <p class="subtitle">hub.controlvector.io</p>
  <div id="banner" class="banner loading">Checking...</div>
  <div id="services" class="services"></div>
  <div id="meta" class="meta"></div>
</div>
<script>
const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? `${location.protocol}//${location.hostname}:3000`
  : 'https://api.hub.controlvector.io';

const LABELS = {
  api: 'API Server',
  postgres: 'PostgreSQL',
  redis: 'Redis',
  falkordb: 'FalkorDB (Graph)',
  qdrant: 'Qdrant (Vectors)',
  git: 'Git Storage',
  mcp: 'MCP Gateway',
};

function formatUptime(s) {
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

async function refresh() {
  const banner = document.getElementById('banner');
  const servicesEl = document.getElementById('services');
  const metaEl = document.getElementById('meta');

  try {
    const res = await fetch(`${API}/api/status`, { cache: 'no-store' });
    const data = await res.json();

    banner.className = `banner ${data.status}`;
    banner.textContent = data.status === 'operational'
      ? 'All Systems Operational'
      : data.status === 'degraded'
        ? 'Partial System Outage'
        : 'Major Outage';

    servicesEl.innerHTML = Object.entries(data.services).map(([key, svc]) => `
      <div class="service">
        <div class="service-left">
          <span class="dot ${svc.status}"></span>
          <div>
            <div class="service-name">${LABELS[key] || key}</div>
            ${svc.error ? `<div class="service-error">${svc.error}</div>` : ''}
          </div>
        </div>
        <span class="service-latency">${svc.latency_ms}ms</span>
      </div>
    `).join('');

    metaEl.innerHTML = `
      <span>Version: ${data.version}</span>
      <span>Uptime: ${formatUptime(data.uptime_seconds)}</span>
      <span>Checked: ${new Date(data.timestamp).toLocaleTimeString()}</span>
    `;
  } catch (err) {
    banner.className = 'banner down';
    banner.textContent = 'Unable to reach API';
    servicesEl.innerHTML = '';
    metaEl.innerHTML = `<span>Error: ${err.message}</span>`;
  }
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
